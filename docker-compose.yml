# Portainer stack. The image is prebuilt by GitHub Actions and published to
# GHCR, so the NAS only pulls it — no building on Synology.
# Provide TMDB_API_KEY via Portainer's "Environment variables" field.
services:
  nightin:
    image: ghcr.io/jordanperkins98/nightin:latest
    pull_policy: always      # "Pull and redeploy" always grabs the newest build
    restart: unless-stopped
    ports:
      - "8024:8080"          # host:container — browse http://<NAS-IP>:8024
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}
      - PORT=8080
      # Optional — connect your server so the deck prioritises what's downloaded
      # and a match can be sent to Radarr/Sonarr. Use the NAS LAN IP (not
      # localhost) so the container can reach them. Leave unset to disable.
      - RADARR_URL=${RADARR_URL:-}
      - RADARR_API_KEY=${RADARR_API_KEY:-}
      - SONARR_URL=${SONARR_URL:-}
      - SONARR_API_KEY=${SONARR_API_KEY:-}
